name: Bug Report
description: Report a bug or unexpected behavior in TCG Sandbox
labels: ["bug", "triage"]
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please provide as much detail as possible to help us understand and reproduce the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is
      placeholder: When I try to create a new card, the form doesn't submit...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Go to Creator > My Games
        2. Click on a game
        3. Click "Create Card"
        4. Fill out the form
        5. Click "Submit"
        6. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
      placeholder: The card should be created and appear in the set
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
      placeholder: The form shows an error message and the card is not created
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of TCG Sandbox is affected?
      options:
        - Game Creation
        - Card/Set Management
        - Deck Builder
        - Game Lobby
        - Authentication/Login
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: What browser/device are you using?
      placeholder: |
        - Browser: Chrome 120
        - OS: macOS 14
        - Device: Desktop
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or error messages
      placeholder: |
        Console errors:
        ```
        TypeError: Cannot read property 'id' of undefined
        ```
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Acknowledgment
      options:
        - label: I have searched existing issues to make sure this hasn't been reported already
          required: true
        - label: I understand this is a solo-developed project and responses may take time
          required: true
