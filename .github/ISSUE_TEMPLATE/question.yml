name: Question
description: Ask a question about TCG Sandbox
labels: ["question"]
title: "[Question]: "
body:
  - type: markdown
    attributes:
      value: |
        Have a question about how TCG Sandbox works? Ask away!

  - type: dropdown
    id: category
    attributes:
      label: Question Category
      description: What is your question about?
      options:
        - How do I... (Usage question)
        - Why does... (Behavior explanation)
        - Is it possible to... (Feature inquiry)
        - Technical/API question
        - Other
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: How do I create a deck that uses cards from multiple sets?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any additional information that might help answer your question?
      placeholder: |
        I tried looking at the docs but couldn't find...
        I'm working on a game that needs...
    validations:
      required: false

  - type: checkboxes
    id: searched
    attributes:
      label: Before asking
      options:
        - label: I have checked the documentation
          required: false
        - label: I have searched existing issues for similar questions
          required: false
